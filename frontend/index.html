<!DOCTYPE html>
<html>

<head>
  <title>ScreenSync UI</title>
</head>

<body>

  <h2>🔐 Login</h2>
  <input id="username" placeholder="username" />
  <input id="password" placeholder="password" type="password" />
  <button onclick="login()">Login</button>

  <p id="loginStatus"></p>

  <hr>

  <h2>📱 Register Device</h2>
  <input id="deviceName" placeholder="Device Name" />
  <button onclick="registerDevice()">Register</button>

  <p id="deviceStatus"></p>

  <script>
    let token = ""

    async function login() {
      const username = document.getElementById("username").value
      const password = document.getElementById("password").value

      const res = await fetch("http://127.0.0.1:8001/api/v1/auth/login", {
        method: "POST",
        headers: {
          "Content-Type": "application/x-www-form-urlencoded"
        },
        body: `username=${username}&password=${password}`
      })

      const data = await res.json()

      if (res.ok) {
        token = data.access_token
        document.getElementById("loginStatus").innerText = "✅ Logged in"
      } else {
        document.getElementById("loginStatus").innerText = "❌ Login failed"
      }
    }

    async function registerDevice() {
      const name = document.getElementById("deviceName").value

      const res = await fetch("http://127.0.0.1:8001/api/v1/devices/devices/register", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": "Bearer " + token
        },
        body: JSON.stringify({
          name: name
        })
      })

      const data = await res.json()

      document.getElementById("deviceStatus").innerText =
        JSON.stringify(data)
    }
  </script>

</body>

</html>
