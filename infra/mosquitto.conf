# ========================
# MOSQUITTO CONFIG
# ========================

listener 1883
protocol mqtt

allow_anonymous true   # TEMP (we'll add auth later)

persistence true
persistence_location /mosquitto/data/

log_dest stdout
log_type all

max_inflight_messages 50
max_queued_messages 1000

# OPTIONAL WebSockets
listener 9001
protocol websockets

connection_messages true