version: "3.11"

services:

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: screensync_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-screensync}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-screensync}
      POSTGRES_DB: ${POSTGRES_DB:-screensync}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-screensync}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - screensync_net

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: screensync_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-screensync}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-screensync}", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - screensync_net

  # ── Mosquitto MQTT Broker ────────────────────────────────────────────────────
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: screensync_mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883" # MQTT
      - "9001:9001" # WebSocket (for browser/mobile mock clients)
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_logs:/mosquitto/log
      - ./mosquitto_passwd:/mosquitto/config/passwd:ro # generated via mosquitto_passwd
    healthcheck:
      test: [ "CMD-SHELL", "mosquitto_sub -h localhost -p 1883 -u ${MQTT_USERNAME:-screensync} -P ${MQTT_PASSWORD:-secret} -t '$$SYS/#' -C 1 -W 3 || exit 1" ]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - screensync_net

  # ── FastAPI Backend ──────────────────────────────────────────────────────────
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: screensync_backend
    restart: unless-stopped
    env_file:
      - ../backend/.env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-screensync}:${POSTGRES_PASSWORD:-screensync}@postgres:5432/${POSTGRES_DB:-screensync}
      REDIS_URL: redis://:${REDIS_PASSWORD:-screensync}@redis:6379
      MQTT_BROKER_HOST: mosquitto
      MQTT_BROKER_PORT: 1883
      MQTT_USERNAME: ${MQTT_USERNAME:-screensync}
      MQTT_PASSWORD: ${MQTT_PASSWORD:-secret}
    ports:
      - "8001:8001"
    volumes:
      - D:/desktop/ScreenTime/backend:/app # live-reload in dev; remove for prod
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mosquitto:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001 --reload
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8001/" ]
      interval: 15s
      timeout: 5s

      retries: 5
    networks:
      - screensync_net

  # ── Nginx API Gateway ────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: screensync_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx_certs:/etc/nginx/certs # mount your TLS certs here
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - screensync_net

  # ── FL Worker (Federated Learning aggregator + drift detector) ───────────────
  fl_worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: screensync_fl_worker
    restart: unless-stopped
    env_file:
      - ../backend/.env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-screensync}:${POSTGRES_PASSWORD:-screensync}@postgres:5432/${POSTGRES_DB:-screensync}
      REDIS_URL: redis://:${REDIS_PASSWORD:-screensync}@redis:6379
      MQTT_BROKER_HOST: mosquitto
      MQTT_BROKER_PORT: 1883
      MQTT_USERNAME: ${MQTT_USERNAME:-screensync}
      MQTT_PASSWORD: ${MQTT_PASSWORD:-secret}
    
    volumes:
      - D:/desktop/ScreenTime/backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: python -m app.modules.fl_worker.aggregator # runs its own event loop
    networks:
      - screensync_net

# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
  redis_data:
  mosquitto_data:
  mosquitto_logs:
  nginx_certs:

    # ── Network ───────────────────────────────────────────────────────────────────
networks:
  screensync_net:
    driver: bridge
